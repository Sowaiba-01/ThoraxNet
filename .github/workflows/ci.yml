name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      # torch from the CPU wheel index: ~200 MB instead of the ~2.5 GB CUDA
      # build that requirements.txt would pull. The runner has no GPU, so the
      # CUDA build is pure download cost — and was timing out the job.
      - name: Install CPU torch
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install test dependencies
        run: pip install -r requirements-ci.txt

      - name: Lint (ruff)
        run: ruff check . --select=E,F,W --ignore=E501

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: junit.xml

  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXTAUTH_SECRET: dummy-secret-for-build-only
          NEXTAUTH_URL: http://localhost:3000

# Deployment is done manually by uploading files to the HuggingFace Space, so
# CI stops at lint/test/build. The previous build-docker + deploy-spaces jobs
# required an HF_TOKEN secret and a Spaces-compatible Docker build that this
# repo doesn't maintain, and only produced a spurious red X on every push.